<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            display: flex;
            gap: 3rem;
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 80px 20px 80px 20px; /* Non-square Shape */
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .form-section {
            flex: 1.2;
        }

        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            padding: 2rem;
            border: 2px dashed rgba(255, 107, 129, 0.3);
        }

        h2 {
            color: #2d3436;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            margin-top: 0;
            letter-spacing: -1px;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.8rem;
            color: #2d3436;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid rgba(0,0,0,0.05);
            border-radius: 20px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
            background: rgba(255,255,255,0.8);
        }

        input:focus {
            outline: none;
            border-color: #ff7675;
            background: white;
            box-shadow: 0 10px 25px rgba(255, 118, 117, 0.15);
        }

        button {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, #ff7675, #fab1a0);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            box-shadow: 0 10px 25px rgba(255, 118, 117, 0.3);
        }

        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 118, 117, 0.5);
        }

        /* Preview Card */
        .mock-card {
            background: white;
            border-radius: 40px 10px 40px 10px;
            overflow: hidden;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .mock-img {
            width: 100%;
            height: 200px;
            background: #eee;
            object-fit: cover;
        }

        .mock-content {
            padding: 2rem;
        }

        .mock-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #2d3436;
            margin: 0 0 0.5rem 0;
        }

        .mock-cuisine {
            color: #ff7675;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .mock-rating {
            background: #ffeaa7;
            color: #d63031;
            padding: 0.5rem 1rem;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 900;
            display: inline-block;
        }
        
        .back-link {
            display: block;
            margin-top: 2rem;
            text-align: center;
            color: #636e72;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .back-link:hover {
            color: #ff7675;
        }
        .back-link:hover {
            color: #ff6b81;
        }

        @media(max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-section">
            <h2>Add Restaurant 🍔</h2>
            <form action="{% url 'add_restaurant' %}" method="post">
                {% csrf_token %}
                <div class="input-group">
                    <label>Restaurant Name</label>
                    <input type="text" name="name" id="nameInput" placeholder="e.g. Burger King" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Picture URL</label>
                    <input type="url" name="picture" id="picInput" placeholder="https://..." required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Cuisine Type</label>
                    <input type="text" name="cuisine" id="cuisineInput" placeholder="e.g. American, Fast Food" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Rating (0 to 5)</label>
                    <input type="number" name="rating" id="ratingInput" min="0" max="5" step="0.1" placeholder="4.5" required>
                </div>
                
                <button type="submit">Create Restaurant</button>
            </form>
            <a href="javascript:history.back()" class="back-link">← Cancel & Go Back</a>
        </div>

        <div class="preview-section">
            <div class="mock-card">
                <img src="https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=400&q=80" alt="Preview" class="mock-img" id="mockImg" onerror="this.src='https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=400&q=80'">
                <div class="mock-content">
                    <h3 class="mock-title" id="mockTitle">Restaurant Name</h3>
                    <p class="mock-cuisine" id="mockCuisine">Cuisine type</p>
                    <div class="mock-rating">⭐ <span id="mockRating">0.0</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Live preview feature
        document.getElementById('nameInput').addEventListener('input', e => {
            document.getElementById('mockTitle').textContent = e.target.value || 'Restaurant Name';
        });
        document.getElementById('picInput').addEventListener('input', e => {
            document.getElementById('mockImg').src = e.target.value || 'https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=400&q=80';
        });
        document.getElementById('cuisineInput').addEventListener('input', e => {
            document.getElementById('mockCuisine').textContent = e.target.value || 'Cuisine type';
        });
        document.getElementById('ratingInput').addEventListener('input', e => {
            document.getElementById('mockRating').textContent = e.target.value || '0.0';
        });
    </script>
</body>
</html>
