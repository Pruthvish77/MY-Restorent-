<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Received</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #191b23;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .success-card {
            background: rgba(255,255,255,0.05);
            padding: 4rem;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { color: #2ecc71; font-size: 3rem; margin: 0 0 1rem 0; }
        p { color: #ccc; font-size: 1.2rem; margin-bottom: 2rem; }
        a {
            display: inline-block;
            padding: 1rem 2rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        a:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div class="success-card">
        <h1>🎉 Application Received!</h1>
        <p>Your restaurant details have been sent to our admins for approval.<br>We will review it shortly!</p>
        <a href="/">Return to Home</a>
    </div>
</body>
</html>
