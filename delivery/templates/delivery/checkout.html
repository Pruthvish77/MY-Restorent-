<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Meal Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, rgba(15,16,21,0.9) 0%, rgba(30,32,42,0.9) 100%),
                        url('https://images.unsplash.com/photo-1556742049-630566e4a00a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 2rem;
        }

        .checkout-card {
            background: rgba(25, 27, 35, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            padding: 4rem 3rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 2rem;
            display: block;
        }

        h2 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .amount-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: #2ecc71;
            margin: 2rem 0;
            text-shadow: 0 10px 20px rgba(46, 204, 113, 0.2);
        }

        .amount-display span {
            font-size: 1.5rem;
            color: #aaa;
            margin-right: 5px;
        }

        p {
            color: #dcdde1;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 3rem;
        }

        #rzp-button1 {
            background: #ff4757;
            color: white;
            border: none;
            padding: 1.5rem 3rem;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.4);
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #rzp-button1:hover {
            transform: scale(1.05) translateY(-5px);
            background: #ff6b81;
            box-shadow: 0 20px 40px rgba(255, 71, 87, 0.5);
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #aaa;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-link:hover {
            color: white;
            text-decoration: underline;
        }

        .secure-badge {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="checkout-card">
        <span class="icon">💳</span>
        <h2>Secure Checkout</h2>
        <p>Your order from <b>Meal Buddy</b> is ready! Complete the payment below to start the delivery.</p>
        
        <div class="amount-display"><span>₹</span>{{ amount }}</div>

        <div style="text-align: left; margin-bottom: 2rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #ff4757; font-weight: 600;">Delivery Address</label>
            <textarea id="orderAddress" style="width: 100%; padding: 1rem; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; font-family: inherit; margin-bottom: 1rem;" rows="3" placeholder="Enter your full delivery address...">{{ customer.address }}</textarea>
            
            <label style="display: block; margin-bottom: 0.5rem; color: #ff4757; font-weight: 600;">Pincode</label>
            <input type="text" id="orderPincode" style="width: 100%; padding: 1rem; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; font-family: inherit; margin-bottom: 1rem;" placeholder="e.g. 560001">
            
            <label style="display: block; margin-bottom: 0.5rem; color: #ff4757; font-weight: 600;">Contact Number</label>
            <input type="text" id="orderPhone" style="width: 100%; padding: 1rem; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; font-family: inherit;" placeholder="Mobile Number" value="{{ customer.mobile }}">
        </div>
        
        <button id="rzp-button1">Pay Now & Order 🚀</button>
        
        <a href="{% url 'show_cart' username %}" class="back-link">← Cancel & Return to Cart</a>

        <div class="secure-badge">
            🔒 SSL Encrypted & Secure Payment
        </div>
    </div>

    <!-- Razorpay Payment Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
    var options = {
        "key": "{{ razorpay_key_id }}",
        "amount": "{{ amount_in_paise }}",
        "currency": "INR",
        "name": "Meal Buddy",
        "description": "Order Payment",
        "image": "https://img.freepik.com/premium-vector/food-delivery-logo-design_664672-132.jpg",
        "order_id": "{{ order_id }}",
        "handler": function (response){
            const address = encodeURIComponent(document.getElementById('orderAddress').value);
            const pincode = encodeURIComponent(document.getElementById('orderPincode').value);
            const phone = encodeURIComponent(document.getElementById('orderPhone').value);
            alert("Payment Successful!");
            window.location.href = `/orders/{{ username }}?payment_id=${response.razorpay_payment_id}&address=${address}&pincode=${pincode}&phone=${phone}`;
        },
        "prefill": {
            "name": "{{ username }}",
            "email": "customer@example.com",
            "contact": "9999999999"
        },
        "theme": {
            "color": "#ff4757"
        }
    };
    var rzp1 = new Razorpay(options);
    rzp1.on('payment.failed', function (response){
            alert("Payment Failed! Reason: " + response.error.description);
    });
    document.getElementById('rzp-button1').onclick = function(e){
        rzp1.open();
        e.preventDefault();
    }
    </script>
</body>
</html>
