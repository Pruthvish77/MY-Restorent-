<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | LuxeBite</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: #0f1015;
            color: white;
            min-height: 100vh;
        }

        .header {
            background: rgba(25, 27, 35, 0.9);
            backdrop-filter: blur(20px);
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            background: linear-gradient(to right, #fff, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            padding: 3rem 5%;
            max-width: 900px;
            margin: 0 auto;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .full-width { grid-column: span 2; }

        label {
            color: #ff4757;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 1.5rem;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            background: rgba(255,255,255,0.1);
            border-color: #ff4757;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.2);
        }

        .section-title {
            grid-column: span 2;
            font-size: 1.2rem;
            font-weight: 800;
            margin: 2rem 0 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
            color: white;
        }

        .save-btn {
            grid-column: span 2;
            background: #ff4757;
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 2rem;
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.3);
        }

        .save-btn:hover {
            transform: translateY(-3px);
            background: #ff6b81;
            box-shadow: 0 20px 40px rgba(255, 71, 87, 0.4);
        }

        .nav-link {
            color: #888;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-link:hover { color: white; }

    </style>
</head>
<body>

    <header class="header">
        <h1>👤 My Profile</h1>
        <div style="display: flex; gap: 2rem;">
            <a href="{% url 'orders' username %}" class="nav-link">Order History</a>
            <a href="{% url 'customer_home' username %}" class="nav-link">Home</a>
        </div>
    </header>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-circle">{{ username|slice:":1"|upper }}</div>
                <div>
                    <h2 style="margin: 0; font-size: 2rem;">{{ username }}</h2>
                    <p style="margin: 5px 0 0 0; color: #888;">Update your personal and banking details</p>
                </div>
            </div>

            <form action="." method="post" class="form-grid">
                {% csrf_token %}
                
                <div class="section-title">Personal Information</div>
                
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" value="{{ customer.email }}" required>
                </div>

                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="text" name="mobile" value="{{ customer.mobile }}" required>
                </div>

                <div class="input-group full-width">
                    <label>Default Delivery Address</label>
                    <input type="text" name="address" value="{{ customer.address }}" required>
                </div>

                <div class="section-title">Banking & Payouts</div>

                <div class="input-group">
                    <label>Bank Name</label>
                    <input type="text" name="bank_name" value="{{ customer.bank_name|default:'' }}" placeholder="e.g. HDFC Bank">
                </div>

                <div class="input-group">
                    <label>IFSC Code</label>
                    <input type="text" name="ifsc_code" value="{{ customer.ifsc_code|default:'' }}" placeholder="e.g. HDFC0001234">
                </div>

                <div class="input-group full-width">
                    <label>Account Number</label>
                    <input type="text" name="bank_account_no" value="{{ customer.bank_account_no|default:'' }}" placeholder="e.g. 50100234567890">
                </div>

                <button type="submit" class="save-btn">Update Profile Details ✨</button>
            </form>
        </div>
    </div>

</body>
</html>
