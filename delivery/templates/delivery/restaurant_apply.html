<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner With Us | Meal Buddy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, rgba(15,16,21,0.9) 0%, rgba(30,32,42,0.9) 100%),
                        url('https://images.unsplash.com/photo-1552566626-52f8b828add9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .apply-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            color: white;
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
        }
        
        p {
            color: #ccc;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #eee;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #ff4757;
            background: rgba(0,0,0,0.5);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(to right, #ff4757, #ff6b81);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #aaa;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="apply-card">
        <h2>Partner with Meal Buddy</h2>
        <p>Apply to list your restaurant and grow your business with us.</p>
        
        <form action="{% url 'restaurant_apply' %}" method="post">
            {% csrf_token %}
            <div class="input-group">
                <label>Restaurant Name</label>
                <input type="text" name="name" required autocomplete="off" placeholder="e.g. Domino's Pizza">
            </div>
            
            <div class="input-group">
                <label>Restaurant Cover Picture URL</label>
                <input type="url" name="picture" required autocomplete="off" placeholder="https://...">
            </div>
            
            <div class="input-group">
                <label>Primary Cuisine Type</label>
                <input type="text" name="cuisine" required autocomplete="off" placeholder="e.g. Italian, Fast Food">
            </div>
            
            <button type="submit">Submit Application 🚀</button>
        </form>
        <a href="/" class="back-link">← Back to Home</a>
    </div>
</body>
</html>
