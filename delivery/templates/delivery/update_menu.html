<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu - {{ restaurant.name }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, rgba(25,27,35,0.85) 0%, rgba(25,27,35,0.85) 100%),
                        url('https://images.unsplash.com/photo-1495195134817-aeb325a55b65?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            margin: 0;
            font-weight: 800;
            color: #ff9a9e;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.3); }

        .container {
            padding: 3rem 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }

        /* Food Card */
        .food-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-color: rgba(255, 154, 158, 0.5);
        }

        .food-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: white;
        }

        .food-body {
            padding: 1.5rem;
            flex-grow: 1;
            position: relative;
        }

        .food-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            padding-right: 70px;
        }

        .food-desc {
            color: #ccc;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .food-price {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: #ff6b81;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
        }

        .food-footer {
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.2);
            display: flex;
            gap: 1rem;
        }

        .card-btn {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .edit-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .edit-btn:hover { background: rgba(255,255,255,0.2); }
        
        .delete-btn { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .delete-btn:hover { background: #e74c3c; color: white; }

        /* Add Form Card */
        .form-card {
            background: rgba(25, 27, 35, 0.8);
            backdrop-filter: blur(25px);
            border: 2px solid #ff9a9e;
            border-radius: 30px;
            padding: 3rem;
            max-width: 800px;
            margin: 2rem auto;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            scroll-margin-top: 100px;
        }

        .form-card h2 {
            color: #ff9a9e;
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 2rem;
            text-align: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .input-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }

        label { margin-bottom: 0.5rem; color: #dcdde1; font-weight: 600; }

        input[type="text"], input[type="url"], input[type="number"], textarea {
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-family: inherit;
        }

        .submit-btn {
            grid-column: 1 / -1;
            padding: 1.2rem;
            background: linear-gradient(45deg, #ff6b81, #ff9a9e);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 107, 129, 0.4); }

        .cancel-edit {
            display: none;
            background: transparent;
            color: #ccc;
            border: 1px solid #ccc;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1>{{ restaurant.name }} - Menu Editor</h1>
        <a href="{% url 'open_show_restaurant' %}" class="back-btn">← Back to Restaurants</a>
    </header>

    <div class="container">
        
        <div class="menu-grid">
            {% if itemList %}
                {% for item in itemList %}
                <div class="food-card">
                    <img src="{{ item.picture }}" class="food-img" alt="{{ item.name }}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&q=80'">
                    <div class="food-body">
                        <div class="food-price">₹{{ item.price }}</div>
                        <h3 class="food-title">{{ item.name }}</h3>
                        <p class="food-desc">{{ item.description }}</p>
                    </div>
                    <div class="food-footer">
                        <button class="card-btn edit-btn" onclick="editItem('{{ item.id }}', '{{ item.name|escapejs }}', '{{ item.price }}', '{{ item.picture|escapejs }}', '{{ item.description|escapejs }}', '{{ item.category|escapejs }}', '{{ item.vegeterian|yesno:'true,false' }}')">✏️ Edit</button>
                        <a href="{% url 'delete_item' item.id %}" class="card-btn delete-btn" onclick="return confirm('Delete this item?')">🗑️ Delete</a>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div style="grid-column: 1/-1; text-align: center; padding: 3rem; background: rgba(255,255,255,0.05); border-radius: 20px;">
                    No items in the menu. Add one below!
                </div>
            {% endif %}
        </div>

        <div class="form-card" id="menuFormContainer">
            <h2 id="formTitle">➕ Add New Menu Item</h2>
            <form action="{% url 'update_menu' restaurant.id %}" method="post" class="form-grid">
                {% csrf_token %}
                <input type="hidden" name="item_id" id="item_id">
                
                <div class="input-group">
                    <label for="name">Item Name</label>
                    <input type="text" id="name" name="name" required placeholder="e.g. Cheese Pizza">
                </div>

                <div class="input-group">
                    <label for="price">Price (₹)</label>
                    <input type="number" id="price" name="price" step="0.01" required placeholder="299.00">
                </div>

                <div class="input-group full-width">
                    <label for="picture">Image URL</label>
                    <input type="url" id="picture" name="picture" required placeholder="https://...">
                </div>

                <div class="input-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" rows="3" required placeholder="Description..."></textarea>
                </div>

                <div class="input-group full-width">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category" required placeholder="Biryani">
                </div>

                <div class="input-group full-width" style="flex-direction: row; align-items: center; gap: 1rem;">
                    <input type="checkbox" id="vegeterian" name="vegeterian" style="width:20px; height:20px;">
                    <label for="vegeterian" style="margin:0;">Vegetarian 🌿</label>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Add Item to Menu</button>
                <button type="button" class="card-btn cancel-edit" id="cancelBtn" onclick="resetForm()">Cancel Edit</button>
            </form>
        </div>

    </div>

    <script>
        function editItem(id, name, price, pic, desc, cat, veg) {
            document.getElementById('item_id').value = id;
            document.getElementById('name').value = name;
            document.getElementById('price').value = price;
            document.getElementById('picture').value = pic;
            document.getElementById('description').value = desc;
            document.getElementById('category').value = cat;
            document.getElementById('vegeterian').checked = (veg === 'true');
            
            document.getElementById('formTitle').innerText = '✏️ Edit Menu Item';
            document.getElementById('submitBtn').innerText = 'Update Item';
            document.getElementById('cancelBtn').style.display = 'block';
            
            document.getElementById('menuFormContainer').scrollIntoView({ behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('item_id').value = '';
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('picture').value = '';
            document.getElementById('description').value = '';
            document.getElementById('category').value = '';
            document.getElementById('vegeterian').checked = false;
            
            document.getElementById('formTitle').innerText = '➕ Add New Menu Item';
            document.getElementById('submitBtn').innerText = 'Add Item to Menu';
            document.getElementById('cancelBtn').style.display = 'none';
        }
    </script>

</body>
</html>
