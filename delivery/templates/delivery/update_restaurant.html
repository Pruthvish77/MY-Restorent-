<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Restaurant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(45deg, #a1c4fd 0%, #c2e9fb 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            gap: 2rem;
            max-width: 1000px;
            width: 90%;
            background: white;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(161, 196, 253, 0.4);
            margin: 2rem 0;
        }

        .form-section {
            flex: 1;
        }

        .preview-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9fa;
            border-radius: 20px;
            padding: 2rem;
            border: 2px dashed #a1c4fd;
        }

        h2 {
            color: #3b82f6;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, #3b82f6, #60a5fa);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        /* Preview Card */
        .mock-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            width: 100%;
            max-width: 320px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .mock-img {
            width: 100%;
            height: 180px;
            background: #eee;
            object-fit: cover;
        }

        .mock-content {
            padding: 1.5rem;
        }

        .mock-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin: 0 0 0.5rem 0;
        }

        .mock-cuisine {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .mock-rating {
            background: #fff3cd;
            color: #856404;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
        }
        
        .back-link {
            display: block;
            margin-top: 1.5rem;
            text-align: center;
            color: #888;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover {
            color: #3b82f6;
        }

        @media(max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-section">
            <h2>Edit Restaurant ✏️</h2>
            <form action="{% url 'update_restaurant' restaurant.id %}" method="post">
                {% csrf_token %}
                <div class="input-group">
                    <label>Restaurant Name</label>
                    <input type="text" name="name" id="nameInput" value="{{restaurant.name}}" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Picture URL</label>
                    <input type="url" name="picture" id="picInput" value="{{restaurant.picture}}" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Cuisine Type</label>
                    <input type="text" name="cuisine" id="cuisineInput" value="{{restaurant.cuisine}}" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label>Rating (0 to 5)</label>
                    <input type="number" name="rating" id="ratingInput" min="0" max="5" step="0.1" value="{{restaurant.rating}}" required>
                </div>
                
                <button type="submit">Update Details</button>
            </form>
            <a href="javascript:history.back()" class="back-link">← Cancel & Go Back</a>
        </div>

        <div class="preview-section">
            <div class="mock-card">
                <img src="{{restaurant.picture}}" alt="Preview" class="mock-img" id="mockImg" onerror="this.src='https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=400&q=80'">
                <div class="mock-content">
                    <h3 class="mock-title" id="mockTitle">{{restaurant.name}}</h3>
                    <p class="mock-cuisine" id="mockCuisine">{{restaurant.cuisine}}</p>
                    <div class="mock-rating">⭐ <span id="mockRating">{{restaurant.rating}}</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Live preview feature
        document.getElementById('nameInput').addEventListener('input', e => {
            document.getElementById('mockTitle').textContent = e.target.value || 'Restaurant Name';
        });
        document.getElementById('picInput').addEventListener('input', e => {
            document.getElementById('mockImg').src = e.target.value || 'https://images.unsplash.com/photo-1514933651103-005eec06c04b?w=400&q=80';
        });
        document.getElementById('cuisineInput').addEventListener('input', e => {
            document.getElementById('mockCuisine').textContent = e.target.value || 'Cuisine type';
        });
        document.getElementById('ratingInput').addEventListener('input', e => {
            document.getElementById('mockRating').textContent = e.target.value || '0.0';
        });
    </script>
</body>
</html>
